<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FrelerrBOT — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e74c3c; letter-spacing: 1px; }
    .sub { font-size: 0.85rem; color: #666; margin-top: 6px; margin-bottom: 36px; }

    .btn-discord {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: #5865F2;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-discord:hover { background: #4752c4; transform: translateY(-1px); }
    .btn-discord svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    .error {
      margin-top: 20px;
      padding: 10px 16px;
      background: #2a1a1a;
      border: 1px solid #e74c3c44;
      border-radius: 8px;
      color: #e74c3c;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FrelerrBOT</h1>
    <p class="sub">Pannello di controllo</p>

    <a class="btn-discord" href="/auth/discord">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"/>
      </svg>
      Accedi con Discord
    </a>

    <div class="error" id="err"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const errMap = {
      '1': 'Autorizzazione negata.',
      '2': 'Errore durante il login. Riprova.',
      '3': 'Non sei membro del server Frelerr.',
      '4': 'Errore del server. Riprova più tardi.',
    };
    const e = params.get('error');
    if (e && errMap[e]) {
      const el = document.getElementById('err');
      el.textContent = errMap[e];
      el.style.display = 'block';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FrelerrBOT — Pannello</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e74c3c;
      letter-spacing: 1px;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .profile img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #2a2a3a;
    }
    .profile span {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ccc;
    }
    .logout-btn {
      margin-left: 8px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }

    /* ── Main ── */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 69px);
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      padding: 48px 44px;
      width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      text-align: center;
    }
    h2 { font-size: 1.2rem; font-weight: 600; color: #aaa; margin-bottom: 28px; }

    /* Status badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 32px;
      transition: all 0.3s;
    }
    .badge.online  { background: #1a3a2a; color: #2ecc71; border: 1px solid #2ecc71; }
    .badge.offline { background: #2a1a1a; color: #888;    border: 1px solid #444; }
    .dot { width: 10px; height: 10px; border-radius: 50%; transition: background 0.3s; }
    .badge.online  .dot { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; animation: pulse 1.5s infinite; }
    .badge.offline .dot { background: #555; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Button */
    #startBtn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
    }
    #startBtn.ready    { background: #e74c3c; color: #fff; }
    #startBtn.ready:hover { background: #c0392b; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(231,76,60,0.4); }
    #startBtn.disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }
    #startBtn.loading  { background: #2a2a3a; color: #888; cursor: not-allowed; }

    .msg { margin-top: 14px; font-size: 0.85rem; color: #888; min-height: 20px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">FrelerrBOT</div>
    <div class="profile">
      <img id="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar">
      <span id="username">...</span>
      <button class="logout-btn" onclick="logout()">Esci</button>
    </div>
  </nav>

  <main>
    <div class="card">
      <h2>Stato del Bot</h2>

      <div class="badge offline" id="badge">
        <div class="dot"></div>
        <span id="statusText">Offline</span>
      </div>

      <br>
      <button id="startBtn" class="disabled" onclick="startBot()">Avvia Bot</button>
      <div class="msg" id="msg"></div>
    </div>
  </main>

  <script>
    // Verifica auth e carica dati utente
    fetch('/api/status').then(r => {
      if (r.status === 401) { window.location.href = '/login.html'; return null; }
      return r.json();
    }).then(data => {
      if (!data) return;
      if (data.user) {
        document.getElementById('avatar').src   = data.user.avatar;
        document.getElementById('username').textContent = data.user.username;
      }
      setStatus(data.status);
    });

    const socket = io();
    let currentStatus = 'offline';

    socket.on('status', setStatus);

    function setStatus(s) {
      currentStatus = s;
      const badge = document.getElementById('badge');
      const btn   = document.getElementById('startBtn');

      badge.className = 'badge ' + s;
      document.getElementById('statusText').textContent = s === 'online' ? 'Online' : 'Offline';

      if (s === 'online') {
        btn.className   = 'disabled';
        btn.textContent = 'Bot già Online';
        btn.disabled    = true;
      } else {
        btn.className   = 'ready';
        btn.textContent = 'Avvia Bot';
        btn.disabled    = false;
      }
    }

    async function startBot() {
      if (currentStatus === 'online') return;
      const btn = document.getElementById('startBtn');
      const msg = document.getElementById('msg');

      btn.className   = 'loading';
      btn.textContent = 'Avvio in corso...';
      btn.disabled    = true;
      msg.textContent = '';

      const res  = await fetch('/api/start', { method: 'POST' });
      const data = await res.json();

      if (!data.ok) {
        msg.textContent = data.message;
        setStatus(currentStatus);
      } else {
        msg.textContent = '✅ Bot avviato.';
        setTimeout(() => { msg.textContent = ''; }, 4000);
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
